<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>税率查询 - 核心区域</title>
  <style>
    /* 外层容器：限定宽度，隐藏溢出内容 */
    .tariff-container {
      width: 1200px; /* 匹配原网站核心区域宽度 */
      height: 800px; /* 核心区域高度，可按需调整 */
      margin: 0 auto;
      overflow: hidden;
      position: relative;
      border: none;
    }
    /* iframe 裁剪：精准切掉顶部导航和底部版权 */
    .tariff-container iframe {
      width: 1200px;
      height: 1000px; /* 比外层高，用于裁剪底部 */
      border: none;
      /* 核心偏移：向上移110px切掉顶部导航，向左移15px对齐 */
      transform: translateY(-110px) translateX(-15px);
      /* 禁止iframe内缩放，保证样式正常 */
      zoom: 1;
    }
  </style>
</head>
<body>
  <div class="tariff-container">
    <!-- 嵌入目标网页，只显示核心查询区域 -->
    <iframe 
      src="https://ftatax.mofcom.gov.cn/wmsw/tariffSearch"
      title="税率查询"
      sandbox="allow-same-origin allow-scripts allow-forms" <!-- 允许表单/脚本交互 -->
    ></iframe>
  </div>
</body>
</html>
